name: Release

# Triggered when you push a v* tag.
# You should create a DRAFT release on GitHub first (with your description,
# changelog, etc.), then push the tag. This workflow builds the binaries on
# each platform's native runner and uploads them to your existing draft.
# Publish the release manually once all three uploads are done.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            flag: --win
            artifact: 'dist/*.exe'
          - os: ubuntu-latest
            flag: --linux
            artifact: 'dist/*.AppImage'
          - os: macos-latest
            flag: --mac
            artifact: 'dist/*.dmg'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: node scripts/build.js ${{ matrix.flag }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          # Don't create a new release - upload to the draft you created first.
          # If no draft exists this will still create one, but ideally you've
          # already created the release on GitHub before pushing the tag.
